name: Keep Supabase Alive

on:
  schedule:
    - cron: '23 8 */3 * *'  # 每3天执行一次
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            || echo "Ping failed but continuing"
